<html>
<head><title>安全团队 On-Call SOP</title></head>
<body>
<div class="content">
  <article>
    <section>
      <h1>安全团队 On-Call SOP</h1>
      <p>安全 on-call 负责公司整体的<strong>安全事件响应</strong>，
      包括<em>入侵检测</em>、<span style="font-weight:bold">漏洞管理</span>和数据泄露处置。</p>
      <ul>
        <li>实时监控 WAF 和 IDS 告警</li>
        <li>处理安全工单和漏洞报告</li>
        <li>协调应急响应和取证分析</li>
      </ul>
    </section>
    <section>
      <h2>安全事件分级</h2>
      <p>S1 - 数据泄露或系统被入侵：立即启动应急预案，通知安全负责人和法务团队。</p>
      <p>S2 - 高危漏洞被利用：4 小时内完成修复或缓解措施。</p>
      <p>S3 - 低风险安全告警：24 小时内评估并处理。</p>
    </section>
    <section>
      <h2>禁止操作</h2>
      <p>严禁在未授权情况下对外部系统进行渗透测试。所有安全操作需双人复核。</p>
    </section>
  </article>
</div>
</body>
</html>
