<h1>移动端 On-Call SOP</h1>
<h2>一、值班职责</h2>
<p>移动端 on-call 负责 iOS 和 Android 客户端的线上稳定性，重点关注崩溃率和 ANR 率。</p>
<h2>二、常见故障处理</h2>
<p>崩溃率飙升：通过 Sentry 定位崩溃堆栈，判断是否为热修复可解决的问题。若崩溃率超过 1%，启动紧急发版流程。</p>
<p>推送服务异常：确认 APNs 和 FCM 推送通道状态。检查推送证书是否过期。</p>
<p>灰度发布异常：暂停灰度推进，回滚到上一稳定版本。通知测试团队复现问题。</p>
<h2>三、发版协调</h2>
<p>紧急发版需通知测试负责人和产品经理，iOS 审核周期约 24-48 小时，需提前评估时间窗口。</p>
