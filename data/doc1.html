<h1>后端服务 On-Call SOP</h1>
<h2>一、值班职责</h2>
<p>后端 on-call 工程师负责监控 API 服务的可用性和响应时间。值班期间需保持手机畅通，收到告警后 5 分钟内响应。</p>
<h2>二、常见故障处理</h2>
<p>API 响应超时：检查上游依赖服务状态，确认数据库连接池是否耗尽。若连接池满，执行重启操作并通知 DBA 团队。</p>
<p>服务 OOM：检查内存泄漏，通过 heap dump 分析对象分配情况。临时扩容后排查根因。</p>
<h2>三、升级流程</h2>
<p>P0 故障：立即拉群，通知技术负责人和 CTO。15 分钟内无法恢复则启动降级预案。</p>
