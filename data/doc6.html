<body>
<h1>数据平台 On-Call SOP</h1>
<h2>一、值班职责</h2>
<p>数据平台 on-call 负责数据管道 &amp; ETL 任务的稳定运行，确保数据按时产出。</p>
<h2>二、常见故障处理</h2>
<p>Spark 任务失败：检查 executor OOM 或 shuffle 数据倾斜。调整分区数或增加 executor 内存。</p>
<p>数据延迟：上游数据未按时到达时，确认数据源状态 &amp; 通知上游团队。同时评估下游报表影响。</p>
<p>数据质量告警：空值率 &gt; 5% 或数据量波动 &gt; 30% 时触发。核实是否为正常业务波动。</p>
<script>
// 数据质量检查脚本
function checkDataQuality(table) {
  var nullRate = query("SELECT count(*) FROM " + table + " WHERE id IS NULL");
  return nullRate > 0.05 ? "alert" : "ok";
}
</script>
<h2>三、升级流程</h2>
<p>核心报表数据延迟超过 2 小时：通知数据负责人，启动降级方案（使用 T-1 数据）。</p>
</body>
</html>
