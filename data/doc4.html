<h1>SRE On-Call SOP</h1>
<p>SRE 团队负责整体基础设施的可用性，目标 SLA 为 99.95%。
<br>值班工程师需要熟悉 Kubernetes 集群管理和云平台运维。
<p>核心监控指标包括：服务可用性、Pod 重启次数、节点资源使用率。</p>
<h2>一、故障响应流程</h2>
<img src=sre-flow.png alt=故障响应流程图>
<p>收到 PagerDuty 告警后，按照以下优先级处理：</p>
<p>P0 - 全站不可用：5 分钟内响应，启动 War Room。</p>
<p>P1 - 核心功能降级：15 分钟内响应，评估影响范围。</p>
<p>P2 - 非核心功能异常：1 小时内响应，记录工单跟进。</p>
<h2>二、容量管理</h2>
<p>CPU 使用率持续超过 70% 时触发扩容，内存使用率超过 80% 时告警。</p>
