<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 文档搜索引擎</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { text-align: center; margin-bottom: 24px; font-size: 1.8rem; color: #2c3e50; }
    .search-box { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-box input { flex: 1; padding: 10px 14px; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; outline: none; }
    .search-box input:focus { border-color: #4a90e2; box-shadow: 0 0 0 2px rgba(74,144,226,0.2); }
    .search-box button { padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .search-box button:hover { background: #357abd; }
    .mode-selector { display: flex; gap: 16px; margin-bottom: 20px; font-size: 0.9rem; color: #666; }
    .mode-selector label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    #results { margin-top: 8px; }
    .result-card { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .result-card h3 { font-size: 1rem; margin-bottom: 6px; }
    .result-card h3 a { color: #4a90e2; text-decoration: none; }
    .result-card h3 a:hover { text-decoration: underline; }
    .result-card .snippet { font-size: 0.88rem; color: #555; line-height: 1.5; margin-bottom: 6px; }
    .result-card .score { font-size: 0.8rem; color: #999; }
    .status { text-align: center; color: #888; font-size: 0.9rem; padding: 20px; }
    .error { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SOP 文档搜索引擎</h1>
    <div class="search-box">
      <input type="text" id="query" placeholder="输入关键词搜索..." autofocus>
      <button onclick="doSearch()">搜索</button>
    </div>
    <div class="mode-selector">
      <label><input type="radio" name="mode" value="keyword" checked> 关键词搜索</label>
      <label><input type="radio" name="mode" value="semantic"> 语义搜索</label>
    </div>
    <div id="results"></div>
  </div>

  <script>
    const API_BASE = window.__API_BASE__ || (window.location.port === '5500' ? 'http://localhost:8000' : '');

    document.getElementById('query').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const q = document.getElementById('query').value.trim();
      const mode = document.querySelector('input[name="mode"]:checked').value;
      const resultsEl = document.getElementById('results');

      if (!q) {
        resultsEl.innerHTML = '<div class="status">请输入搜索词</div>';
        return;
      }

      resultsEl.innerHTML = '<div class="status">搜索中...</div>';

      try {
        const resp = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}&mode=${mode}`);
        if (!resp.ok) {
          const contentType = resp.headers.get('content-type') || '';
          if (contentType.includes('application/json')) {
            const err = await resp.json();
            resultsEl.innerHTML = `<div class="status error">错误：${err.detail || resp.statusText}</div>`;
          } else {
            const text = await resp.text();
            const message = text.trim() ? text.slice(0, 120) : resp.statusText;
            resultsEl.innerHTML = `<div class="status error">错误：HTTP ${resp.status} - ${escapeHtml(message)}</div>`;
          }
          return;
        }

        const data = await resp.json();
        renderResults(data);
      } catch (e) {
        resultsEl.innerHTML = `<div class="status error">请求失败：${e.message}</div>`;
      }
    }

    function renderResults(data) {
      const resultsEl = document.getElementById('results');
      const results = data.results || [];

      if (results.length === 0) {
        resultsEl.innerHTML = '<div class="status">未找到相关文档</div>';
        return;
      }

      const html = results.map(r => `
        <div class="result-card">
          <h3><a href="#" onclick="return false">${escapeHtml(r.title || r.id)}</a></h3>
          <div class="snippet">${escapeHtml(r.snippet || '')}</div>
          <div class="score">分数：${r.score.toFixed(4)} | ID: ${escapeHtml(r.id)}</div>
        </div>
      `).join('');

      resultsEl.innerHTML = `<div class="status">找到 ${results.length} 个结果</div>` + html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
